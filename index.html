<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rawan Hatem | Content Creator</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="home-page">

    <main id="readme-content">
        Loading...
    </main>

    <script>
        fetch('README.md')
            .then(response => response.text())
            .then(markdown => {

                const content = document.getElementById('readme-content');

                content.innerHTML = marked.parse(markdown);

                // Skills
                const skillsHeading = [...content.querySelectorAll('h2')]
                    .find(h2 => h2.textContent.trim() === 'Skills');

                if (skillsHeading) {
                    const skillsList = skillsHeading.nextElementSibling;

                    if (skillsList && skillsList.tagName === 'UL') {
                        skillsList.classList.add('skills-list');
                    }
                }

                // Currently Exploring
                const exploringHeading = [...content.querySelectorAll('h2')]
                    .find(h2 => h2.textContent.trim() === 'Currently Exploring');

                if (exploringHeading) {
                    const exploringList = exploringHeading.nextElementSibling;

                    if (exploringList && exploringList.tagName === 'UL') {
                        exploringList.classList.add('skills-list');
                    }
                }

                // My Projects
                const projectsHeading = [...content.querySelectorAll('h2')]
                    .find(h2 => h2.textContent.trim() === 'My Projects');

                if (projectsHeading) {
                    const projectsList = projectsHeading.nextElementSibling;

                    if (projectsList && projectsList.tagName === 'UL') {
                        projectsList.classList.add('project-list');

                        projectsList.querySelectorAll('a')
                            .forEach(link => {
                                link.classList.add('project-card');
                            });
                    }
                }

            })
            .catch(error => {
                document.getElementById('readme-content').innerHTML =
                    '<p>Could not load README.</p>';
            });
    </script>

</body>

</html>
